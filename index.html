<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPX Vejr-Dashboard Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg-color: #f8fafc; --panel-bg: rgba(255, 255, 255, 0.95); --text-color: #1e293b; --card-bg: rgba(255, 255, 255, 0.9); --border-color: rgba(0,0,0,0.1); --accent: #4f46e5; }
        .dark-mode { --bg-color: #0f172a; --panel-bg: rgba(30, 41, 59, 0.95); --text-color: #f1f5f9; --card-bg: rgba(30, 41, 59, 0.9); --border-color: rgba(255,255,255,0.1); --accent: #818cf8; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: var(--bg-color); color: var(--text-color); transition: 0.3s; }
        #map { height: 100%; width: 100%; z-index: 1; }
        #panel { position: absolute; top: 20px; right: 20px; width: 420px; height: 90vh; background: var(--panel-bg); backdrop-filter: blur(20px); border-radius: 20px; z-index: 1000; padding: 20px; overflow-y: auto; border: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .date-row { display: flex; gap: 5px; margin-bottom: 10px; align-items: center; }
        select { padding: 6px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-color); }
        .poi-card { background: var(--card-bg); padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--border-color); }
        .btn-upload { background: var(--accent); color: white; padding: 12px; border-radius: 8px; cursor: pointer; text-align: center; display: block; font-weight: bold; margin-top: 10px; }
        
        #modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: var(--card-bg); padding: 30px; border-radius: 20px; max-width: 400px; text-align: center; border: 1px solid var(--border-color); }
    </style>
</head>
<body>

<div id="modal">
    <div class="modal-content">
        <h2>Velkommen</h2>
        <p>1. Starttidspunkt er sat til nu.<br>2. Upload din GPX-fil.<br>3. Se vejrudsigten for start, mål og depoter.</p>
        <button onclick="document.getElementById('modal').style.display='none'" class="btn-upload">Forstået</button>
    </div>
</div>

<div id="map"></div>
<div id="panel">
    <h2>Rute Vejr-Dashboard</h2>
    
    <label>Start (Nu):</label>
    <div class="date-row">
        <select id="day"></select><select id="month"></select><select id="year"></select>
        <select id="hour"></select><select id="min"></select>
    </div>

    <label>Slut:</label>
    <div class="date-row">
        <select id="end-day"></select><select id="end-month"></select><select id="end-year"></select>
        <select id="end-hour"></select><select id="end-min"></select>
    </div>

    <label class="btn-upload">Upload GPX-fil
        <input type="file" id="gpx" hidden accept=".gpx">
    </label>
    <div id="list" style="margin-top:20px;"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([56.0, 11.0], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    function initTimes(dId, mId, yId, hId, minId, offset = 0) {
        const now = new Date(); now.setMinutes(now.getMinutes() + offset);
        
        const dEl = document.getElementById(dId);
        const mEl = document.getElementById(mId);
        const yEl = document.getElementById(yId);
        const hEl = document.getElementById(hId);
        const minEl = document.getElementById(minId);

        for(let i=1; i<=31; i++) dEl.add(new Option(i.toString().padStart(2,'0'), i));
        for(let i=1; i<=12; i++) mEl.add(new Option(i.toString().padStart(2,'0'), i));
        for(let i=now.getFullYear(); i<=now.getFullYear()+1; i++) yEl.add(new Option(i, i));
        for(let i=0; i<24; i++) hEl.add(new Option(i.toString().padStart(2,'0'), i));
        for(let i=0; i<60; i+=15) minEl.add(new Option(i.toString().padStart(2,'0'), i));
        
        dEl.value = now.getDate();
        mEl.value = now.getMonth() + 1;
        yEl.value = now.getFullYear();
        hEl.value = now.getHours();
        minEl.value = Math.floor(now.getMinutes() / 15) * 15;
    }
    
    initTimes('day', 'month', 'year', 'hour', 'min');
    initTimes('end-day', 'end-month', 'end-year', 'end-hour', 'end-min', 60); // Sluttid 1 time senere som standard

    async function processPoint(lat, lon, name, list) {
        const card = document.createElement('div');
        card.className = 'poi-card';
        card.innerHTML = `<strong>${name}</strong><br><span class="weather">Henter vejr...</span>`;
        list.appendChild(card);
        try {
            const res = await fetch(`https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=${lat}&lon=${lon}`, { headers: { 'User-Agent': 'GPXApp' } });
            const d = await res.json();
            const w = d.properties.timeseries[0].data.instant.details;
            card.querySelector('.weather').innerHTML = `🌡️ ${w.air_temperature}°C, 💨 ${w.wind_speed} m/s`;
        } catch { card.querySelector('.weather').innerHTML = "Vejr fejl"; }
        L.marker([lat, lon]).addTo(map).bindPopup(name);
    }

    document.getElementById('gpx').addEventListener('change', async function(e) {
        const text = await e.target.files[0].text();
        const xml = new DOMParser().parseFromString(text, "text/xml");
        const list = document.getElementById('list'); list.innerHTML = '';
        const trkpts = Array.from(xml.getElementsByTagName("trkpt"));
        const wpts = Array.from(xml.getElementsByTagName("wpt"));
        
        const coords = trkpts.map(p => [p.getAttribute("lat"), p.getAttribute("lon")]);
        const poly = L.polyline(coords, {color: '#4f46e5', weight: 4}).addTo(map);
        map.fitBounds(poly.getBounds(), {paddingTopLeft: [50, 50], paddingBottomRight: [450, 50]});

        for(let pt of wpts) await processPoint(pt.getAttribute("lat"), pt.getAttribute("lon"), pt.getElementsByTagName("name")[0]?.textContent || "Depot", list);
        if(trkpts.length > 0) {
            await processPoint(trkpts[0].getAttribute("lat"), trkpts[0].getAttribute("lon"), "Start", list);
            await processPoint(trkpts[trkpts.length-1].getAttribute("lat"), trkpts[trkpts.length-1].getAttribute("lon"), "Mål", list);
        }
    });
</script>
</body>
</html>
