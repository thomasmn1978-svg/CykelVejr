<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Rutevejr for cykelryttere</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
    <style>
        :root {
            --bg: #030712;
            --panel: rgba(8, 13, 23, 0.96);
            --panel-strong: rgba(3, 7, 18, 0.99);
            --card: #0b1220;
            --card-soft: #111827;
            --text: #f8fafc;
            --muted: #94a3b8;
            --accent: #00e5ff;
            --accent-2: #39ff88;
            --warning: #facc15;
            --danger: #ff4d4d;
            --border: rgba(148, 163, 184, 0.22);
            --shadow: 0 24px 70px rgba(0, 0, 0, 0.70);
        }

        * { box-sizing: border-box; }

        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(0, 229, 255, 0.12), transparent 30%),
                radial-gradient(circle at bottom right, rgba(57, 255, 136, 0.08), transparent 36%),
                var(--bg);
            color: var(--text);
        }

        #map {
            height: 100%;
            width: 100%;
            background: #050816;
            filter: saturate(1.06) contrast(1.05);
        }

        #panel {
            position: absolute;
            top: 14px;
            right: 14px;
            z-index: 1000;
            width: min(410px, calc(100vw - 28px));
            max-height: calc(100vh - 28px);
            overflow-y: auto;
            padding: 16px;
            background: var(--panel);
            backdrop-filter: blur(18px);
            border: 1px solid var(--border);
            border-top: 1px solid rgba(0, 229, 255, 0.38);
            border-radius: 24px;
            box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.04);
            overscroll-behavior: contain;
        }

        #panelHandle {
            display: none;
            width: 52px;
            height: 5px;
            border: 0;
            border-radius: 999px;
            background: rgba(203, 213, 225, 0.65);
            margin: 0 auto 12px;
            padding: 0;
        }

        .app-title {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        h1 {
            margin: 0;
            font-size: 1.15rem;
            line-height: 1.15;
            letter-spacing: -0.02em;
        }

        .subtitle {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 0.82rem;
        }

        .badge {
            flex: 0 0 auto;
            padding: 6px 9px;
            border-radius: 999px;
            background: rgba(56, 189, 248, 0.12);
            color: #bae6fd;
            border: 1px solid rgba(56, 189, 248, 0.35);
            font-size: 0.72rem;
            font-weight: 700;
        }

        .section {
            background: rgba(17, 24, 39, 0.72);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 12px;
            margin-top: 10px;
        }

        .section-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: 800;
            font-size: 0.9rem;
        }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .input-group.full { grid-column: 1 / -1; }

        label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #cbd5e1;
        }

        input {
            width: 100%;
            min-height: 42px;
            padding: 10px 11px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: #0f172a;
            color: var(--text);
            font: inherit;
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.14);
        }

        input[readonly] {
            color: #e0f2fe;
            background: rgba(14, 165, 233, 0.08);
        }

        .btn {
            width: 100%;
            border: 0;
            border-radius: 14px;
            padding: 12px 14px;
            min-height: 44px;
            cursor: pointer;
            font-weight: 850;
            color: white;
            background: linear-gradient(135deg, #0284c7, #22c55e);
            box-shadow: 0 14px 30px rgba(2, 132, 199, 0.22);
            text-align: center;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn.secondary {
            background: rgba(148, 163, 184, 0.14);
            box-shadow: none;
            border: 1px solid var(--border);
            color: #e2e8f0;
        }

        .btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .top-actions {
            margin-top: 0;
            margin-bottom: 12px;
        }

        #route-info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .stat {
            padding: 9px;
            background: rgba(15, 23, 42, 0.7);
            border-radius: 14px;
            border: 1px solid rgba(148, 163, 184, 0.16);
        }

        .stat small {
            display: block;
            color: var(--muted);
            font-size: 0.68rem;
            margin-bottom: 3px;
        }

        .stat strong {
            font-size: 0.9rem;
        }

        #hint {
            color: var(--muted);
            font-size: 0.8rem;
            line-height: 1.35;
            margin-top: 8px;
        }

        #status {
            color: #bae6fd;
            font-size: 0.78rem;
            line-height: 1.35;
            margin-top: 8px;
        }

        .poi-card {
            position: relative;
            margin-top: 10px;
            padding: 12px;
            background: rgba(15, 23, 42, 0.88);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-left: 5px solid var(--accent);
            border-radius: 16px;
        }

        .poi-card.start { border-left-color: var(--accent-2); }
        .poi-card.finish { border-left-color: var(--warning); }

        .poi-top {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: flex-start;
        }

        .poi-name {
            font-weight: 900;
            letter-spacing: -0.01em;
        }

        .poi-meta {
            color: var(--muted);
            font-size: 0.76rem;
            margin-top: 3px;
        }

        .weather {
            margin-top: 9px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 7px;
            font-size: 0.8rem;
        }

        .weather-line {
            padding: 8px;
            border-radius: 12px;
            background: rgba(31, 41, 55, 0.72);
        }

        .weather-line.full { grid-column: 1 / -1; }

        .delete-btn {
            background: rgba(239, 68, 68, 0.12);
            color: #fecaca;
            border: 1px solid rgba(239, 68, 68, 0.28);
            border-radius: 10px;
            cursor: pointer;
            font-weight: 900;
            padding: 4px 8px;
            line-height: 1;
        }

        .wind-arrow {
            display: inline-block;
            color: #fde68a;
            font-size: 1.1em;
            font-weight: 900;
            margin-left: 4px;
            transform-origin: center;
        }

        .leaflet-popup-content-wrapper, .leaflet-popup-tip {
            background: #0f172a;
            color: var(--text);
        }

        .flatpickr-calendar {
            background: #0f172a;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            color: var(--text);
        }

        .flatpickr-day,
        .flatpickr-weekday,
        .flatpickr-current-month,
        .flatpickr-current-month input.cur-year,
        .flatpickr-time input,
        .flatpickr-time .flatpickr-time-separator,
        .flatpickr-time .flatpickr-am-pm,
        .flatpickr-monthDropdown-months,
        .flatpickr-monthDropdown-months .flatpickr-monthDropdown-month {
            color: var(--text) !important;
        }

        .flatpickr-monthDropdown-months,
        .flatpickr-monthDropdown-months .flatpickr-monthDropdown-month,
        .flatpickr-current-month input.cur-year,
        .flatpickr-time input {
            background: #0f172a !important;
        }

        .flatpickr-day:hover,
        .flatpickr-day:focus {
            background: rgba(14, 165, 233, 0.28) !important;
            border-color: rgba(14, 165, 233, 0.60) !important;
            color: var(--text) !important;
        }

        .flatpickr-day.today {
            border-color: var(--accent) !important;
        }

        .flatpickr-day.prevMonthDay,
        .flatpickr-day.nextMonthDay,
        .flatpickr-day.flatpickr-disabled {
            color: #64748b !important;
        }

        .flatpickr-day.selected, .flatpickr-day.startRange, .flatpickr-day.endRange {
            background: #0284c7 !important;
            border-color: #0284c7 !important;
        }

        .flatpickr-time, .flatpickr-months .flatpickr-month {
            background: #0f172a;
            color: var(--text);
        }


        .coverage-warning {
            grid-column: 1 / -1;
            padding: 10px;
            border-radius: 12px;
            background: rgba(250, 204, 21, 0.12);
            border: 1px solid rgba(250, 204, 21, 0.35);
            color: #fde68a;
            font-weight: 700;
        }

        .data-time {
            color: var(--muted);
            font-size: 0.78rem;
        }

        .poi-card {
            background: linear-gradient(180deg, rgba(15, 23, 42, .98), rgba(3, 7, 18, .96));
            border: 1px solid rgba(148, 163, 184, .22);
            border-left: 4px solid var(--accent);
            box-shadow: inset 0 1px 0 rgba(255,255,255,.04), 0 12px 32px rgba(0,0,0,.28);
        }

        .poi-card.start { border-left-color: var(--accent-2); }
        .poi-card.finish { border-left-color: var(--warning); }

        .btn {
            background: linear-gradient(135deg, #00bcd4, #0ea5e9);
            color: #001018;
            font-weight: 900;
            letter-spacing: .01em;
        }

        .btn.secondary {
            background: rgba(15, 23, 42, .92);
            color: var(--text);
            border: 1px solid rgba(0, 229, 255, .32);
        }

        .custom-marker.user-point-marker > div {
            background: #38bdf8;
            color: #06101f;
        }

        /* Mere kompakte vejrpunkter i menuen */
        .poi-card {
            margin-top: 7px;
            padding: 8px 9px;
            border-radius: 13px;
        }

        .poi-top {
            gap: 7px;
        }

        .poi-name {
            font-size: 0.88rem;
            line-height: 1.15;
        }

        .poi-meta {
            font-size: 0.70rem;
            margin-top: 1px;
        }

        .weather {
            margin-top: 6px;
            gap: 5px;
            font-size: 0.74rem;
        }

        .weather-line {
            padding: 6px 7px;
            border-radius: 10px;
        }

        .delete-btn {
            padding: 3px 7px;
        }

        @media (max-width: 720px) {
            body { touch-action: manipulation; }

            #panel {
                top: auto;
                right: 8px;
                left: 8px;
                bottom: 8px;
                width: auto;
                max-height: 58vh;
                border-radius: 24px 24px 20px 20px;
                padding: 12px;
                transition: max-height .22s ease, transform .22s ease;
            }

            #panelHandle { display: block; }

            #panel.collapsed {
                max-height: 116px;
                overflow: hidden;
            }

            #panel.collapsed .section,
            #panel.collapsed .subtitle,
            #panel.collapsed .badge {
                display: none;
            }

            #panel.collapsed .app-title { margin-bottom: 0; }
            #panel h1::after {
                content: " · tryk øverst for at minimere";
                color: var(--muted);
                font-size: .78rem;
                font-weight: 600;
            }

            #panel.collapsed h1::after {
                content: " · tryk for at åbne";
            }

            .input-grid, .btn-row, #route-info {
                grid-template-columns: 1fr;
            }

            .weather { grid-template-columns: 1fr; }
            .poi-card { padding: 9px; }
            .weather-line { min-height: 34px; font-size: .82rem; }
            input, .btn { min-height: 48px; font-size: 16px; }
        }
    </style>
</head>
<body>
    <div id="map"></div>


    <aside id="panel" aria-label="Rutevejr panel">
        <button id="panelHandle" type="button" aria-label="Fold panel sammen eller ud"></button>
        <div class="app-title">
            <div>
                <h1>Rutevejr</h1>
                <p class="subtitle">Vejr langs GPX-ruten på dine passagetider</p>
            </div>
            <span class="badge">Cykel</span>
        </div>

        <section class="section">
            <div class="section-title">Turdata</div>
            <div class="btn-row top-actions">
                <label class="btn" for="gpx">📁 Upload GPX<input type="file" id="gpx" hidden accept=".gpx,application/gpx+xml,text/xml" /></label>
                <button class="btn secondary" id="refreshBtn" type="button">🔄 Opdater vejr</button>
            </div>
            <div class="input-grid">
                <div class="input-group">
                    <label for="startDate">Startdato</label>
                    <input type="text" id="startDate" inputmode="numeric" placeholder="dd-mm-åååå" />
                </div>
                <div class="input-group">
                    <label for="startTime">Starttid</label>
                    <input type="text" id="startTime" inputmode="numeric" placeholder="tt:mm" />
                </div>
                <div class="input-group full">
                    <label for="speedInput">Forventet gennemsnitsfart, km/t</label>
                    <input type="number" id="speedInput" value="30" min="5" max="80" step="0.1" />
                </div>
                <div class="input-group">
                    <label for="endDate">Forventet slutdato</label>
                    <input type="text" id="endDate" readonly />
                </div>
                <div class="input-group">
                    <label for="endTime">Forventet sluttid</label>
                    <input type="text" id="endTime" readonly />
                </div>
            </div>
            <div id="status">Upload en GPX-rute for at starte.</div>
        </section>

        <section class="section" id="statsSection" style="display:none;">
            <div class="section-title">Rute</div>
            <div id="route-info"></div>
            <div id="hint">Klik på ruten/kortet for at tilføje egne vejrpunkter. Punktet snappes automatisk til nærmeste sted på ruten.</div>
        </section>

        <section class="section">
            <div class="section-title">
                <span>Vejrpunkter</span>
                <span id="pointCount" style="color: var(--muted); font-size: .75rem;">0 punkter</span>
            </div>
            <div id="list"></div>
        </section>
    </aside>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/da.js"></script>
    <script>
        const MET_USER_AGENT = "GPXRouteWeather/1.0 thomasmn1978";
        const map = L.map("map", { zoomControl: true }).setView([56.2, 10.7], 7);

        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            maxZoom: 19,
            attribution: "&copy; OpenStreetMap"
        }).addTo(map);

        const routeLayer = L.layerGroup().addTo(map);
        const pointLayer = L.layerGroup().addTo(map);

        let routeLine = null;
        let pointCollection = [];
        let polylineCoords = [];
        let cumulativeKm = [];
        let totalDist = 0;
        let weatherCache = new Map();
        let weatherRunId = 0;

        const els = {
            startDate: document.getElementById("startDate"),
            startTime: document.getElementById("startTime"),
            speed: document.getElementById("speedInput"),
            endDate: document.getElementById("endDate"),
            endTime: document.getElementById("endTime"),
            gpx: document.getElementById("gpx"),
            list: document.getElementById("list"),
            status: document.getElementById("status"),
            routeInfo: document.getElementById("route-info"),
            statsSection: document.getElementById("statsSection"),
            pointCount: document.getElementById("pointCount"),
            refreshBtn: document.getElementById("refreshBtn"),
            panel: document.getElementById("panel"),
            panelHandle: document.getElementById("panelHandle")
        };

        // Sørger for, at der aldrig vises mere end én intro-popup, selv hvis siden hostes
        // sammen med ældre indlejret kode eller browseren genindlæser dele af DOM'en.

        function setMobilePanel(open) {
            if (!window.matchMedia("(max-width: 720px)").matches) return;
            els.panel.classList.toggle("collapsed", !open);
            setTimeout(fitRouteInVisibleArea, 230);
        }

        function pad(n) { return String(n).padStart(2, "0"); }

        function formatDateDA(date) {
            return `${pad(date.getDate())}-${pad(date.getMonth() + 1)}-${date.getFullYear()}`;
        }

        function formatTime24(date) {
            return `${pad(date.getHours())}:${pad(date.getMinutes())}`;
        }

        function formatDateTimeDA(date) {
            return `${formatDateDA(date)} kl. ${formatTime24(date)}`;
        }

        function parseDatoTid(dVal, tVal) {
            if (!dVal || !tVal) return null;
            const [d, m, y] = dVal.split("-").map(Number);
            const [hh, mm] = tVal.split(":").map(Number);
            if (![d, m, y, hh, mm].every(Number.isFinite)) return null;
            const parsed = new Date(y, m - 1, d, hh, mm);
            return Number.isNaN(parsed.getTime()) ? null : parsed;
        }

        function getSpeed() {
            const speed = parseFloat(String(els.speed.value).replace(",", "."));
            return Number.isFinite(speed) && speed > 0 ? speed : null;
        }

        function durationLabel(hours) {
            if (!Number.isFinite(hours)) return "–";
            const mins = Math.round(hours * 60);
            const h = Math.floor(mins / 60);
            const m = mins % 60;
            return h > 0 ? `${h} t ${pad(m)} min` : `${m} min`;
        }

        function setStatus(text) {
            els.status.textContent = text;
        }

        function initPickers() {
            const now = new Date();
            flatpickr(els.startDate, {
                locale: "da",
                dateFormat: "d-m-Y",
                defaultDate: now,
                minDate: "today",
                disableMobile: true,
                onChange: updateAll
            });

            flatpickr(els.startTime, {
                locale: "da",
                enableTime: true,
                noCalendar: true,
                time_24hr: true,
                dateFormat: "H:i",
                defaultDate: now,
                minuteIncrement: 5,
                disableMobile: true,
                onChange: updateAll
            });
        }

        function buildCumulativeDistances(coords) {
            cumulativeKm = [0];
            let sum = 0;
            for (let i = 0; i < coords.length - 1; i++) {
                sum += L.latLng(coords[i]).distanceTo(L.latLng(coords[i + 1])) / 1000;
                cumulativeKm.push(sum);
            }
            totalDist = sum;
        }

        function nearestRoutePoint(latlng) {
            let minD = Infinity;
            let bestIndex = 0;
            for (let i = 0; i < polylineCoords.length; i++) {
                const d = L.latLng(polylineCoords[i]).distanceTo(latlng);
                if (d < minD) {
                    minD = d;
                    bestIndex = i;
                }
            }
            return {
                lat: polylineCoords[bestIndex][0],
                lon: polylineCoords[bestIndex][1],
                dist: cumulativeKm[bestIndex] || 0,
                distanceFromClick: minD
            };
        }

        function firstUsefulName(address = {}) {
            // Vigtigt for cykelryttere: Brug vejnavn først. Hvis der ikke findes et vejnavn,
            // bruges det nærmeste stednavn i en fornuftig prioriteret rækkefølge.
            return address.road
                || address.pedestrian
                || address.cycleway
                || address.path
                || address.footway
                || address.track
                || address.bridleway
                || address.neighbourhood
                || address.suburb
                || address.hamlet
                || address.village
                || address.town
                || address.city
                || address.municipality
                || address.county
                || address.state
                || null;
        }

        async function getLocName(lat, lon) {
            try {
                const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1&accept-language=da`;
                const res = await fetch(url);
                if (!res.ok) throw new Error("Nominatim fejl");
                const data = await res.json();
                const name = firstUsefulName(data.address);
                if (name) return name;

                // Sidste fallback: brug første meningsfulde del af display_name.
                if (data.display_name) {
                    return data.display_name.split(",").map(x => x.trim()).find(Boolean) || "Vejrpunkt";
                }
                return "Vejrpunkt";
            } catch (e) {
                return "Vejrpunkt";
            }
        }

        function markerIcon(type, number = null) {
            const color = type === "start" ? "#22c55e" : type === "finish" ? "#f59e0b" : "#38bdf8";
            const label = type === "start" ? "S" : type === "finish" ? "M" : String(number || "•");
            const extraClass = type === "user" ? " user-point-marker" : "";
            return L.divIcon({
                className: `custom-marker${extraClass}`,
                html: `<div style="display:grid;place-items:center;width:28px;height:28px;border-radius:999px;background:${color};color:#06101f;font-weight:900;border:3px solid white;box-shadow:0 8px 20px rgba(0,0,0,.35);">${label}</div>`,
                iconSize: [28, 28],
                iconAnchor: [14, 14]
            });
        }

        function routeOrderedPoints() {
            const start = pointCollection.filter(p => p.type === "start").sort((a, b) => a.dist - b.dist);
            const users = pointCollection.filter(p => p.type === "user").sort((a, b) => a.dist - b.dist);
            const finish = pointCollection.filter(p => p.type === "finish").sort((a, b) => a.dist - b.dist);
            return [...start, ...users, ...finish];
        }

        function userPointNumber(point) {
            return pointCollection
                .filter(p => p.type === "user")
                .sort((a, b) => a.dist - b.dist)
                .findIndex(p => p.id === point.id) + 1;
        }

        function updatePointMarkers() {
            pointCollection.forEach(p => {
                const number = p.type === "user" ? userPointNumber(p) : null;
                p.marker.setIcon(markerIcon(p.type, number));
                const label = p.type === "user" ? `${number}. ${p.name}` : p.name;
                p.marker.bindPopup(`<strong>${label}</strong><br>${p.dist.toFixed(1).replace(".", ",")} km fra start`);
            });
        }

        function routeBearing(from, to) {
            const lat1 = from[0] * Math.PI / 180;
            const lat2 = to[0] * Math.PI / 180;
            const dLon = (to[1] - from[1]) * Math.PI / 180;
            const y = Math.sin(dLon) * Math.cos(lat2);
            const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        function pointAtDistance(km) {
            if (!polylineCoords.length || !cumulativeKm.length) return null;
            for (let i = 1; i < cumulativeKm.length; i++) {
                if (cumulativeKm[i] >= km) {
                    const prevKm = cumulativeKm[i - 1];
                    const nextKm = cumulativeKm[i];
                    const ratio = nextKm === prevKm ? 0 : (km - prevKm) / (nextKm - prevKm);
                    const from = polylineCoords[i - 1];
                    const to = polylineCoords[i];
                    return {
                        lat: from[0] + (to[0] - from[0]) * ratio,
                        lon: from[1] + (to[1] - from[1]) * ratio,
                        bearing: routeBearing(from, to)
                    };
                }
            }
            const last = polylineCoords.length - 1;
            return {
                lat: polylineCoords[last][0],
                lon: polylineCoords[last][1],
                bearing: routeBearing(polylineCoords[last - 1], polylineCoords[last])
            };
        }

        async function addPoint(lat, lon, name = null, type = "user", forceDist = null) {
            const id = `p-${Date.now()}-${Math.round(Math.random() * 100000)}`;
            const displayName = name || await getLocName(lat, lon);
            const dist = forceDist !== null ? forceDist : nearestRoutePoint(L.latLng(lat, lon)).dist;
            const marker = L.marker([lat, lon], { icon: markerIcon(type) }).addTo(pointLayer);
            pointCollection.push({ id, lat, lon, name: displayName, type, dist, marker });
            pointCollection.sort((a, b) => a.dist - b.dist);
            updatePointMarkers();
            updateAll();
        }

        function removePoint(id) {
            const p = pointCollection.find(x => x.id === id);
            if (!p || p.type !== "user") return;
            pointLayer.removeLayer(p.marker);
            pointCollection = pointCollection.filter(x => x.id !== id);
            updatePointMarkers();
            updateAll();
        }

        window.removePoint = removePoint;

        window.addEventListener("resize", () => {
            clearTimeout(window.__routeFitTimer);
            window.__routeFitTimer = setTimeout(fitRouteInVisibleArea, 150);
        });

        function formatWindValue(value) {
            const num = Number(value);
            if (!Number.isFinite(num)) return "–";
            return Number.isInteger(num) ? String(num) : num.toFixed(1).replace(".", ",");
        }

        function forecastSymbol(ts) {
            const symbol = ts?.data?.next_1_hours?.summary?.symbol_code || ts?.data?.next_6_hours?.summary?.symbol_code || "";
            if (symbol.includes("rain")) return "🌧️";
            if (symbol.includes("cloud")) return "☁️";
            if (symbol.includes("clear")) return "☀️";
            if (symbol.includes("sleet")) return "🌨️";
            if (symbol.includes("snow")) return "❄️";
            if (symbol.includes("fog")) return "🌫️";
            return "🌦️";
        }

        function chooseForecast(timeseries, target) {
            if (!timeseries?.length || !target) {
                return { ts: null, reason: "MET/YR leverede ikke vejrdata for punktet." };
            }

            const firstTime = new Date(timeseries[0].time);
            const lastTime = new Date(timeseries[timeseries.length - 1].time);

            if (target < firstTime || target > lastTime) {
                return {
                    ts: null,
                    reason: `Der findes kun vejrdata fra ${formatDateTimeDA(firstTime)} til ${formatDateTimeDA(lastTime)}.`
                };
            }

            let best = timeseries[0];
            let bestDelta = Math.abs(new Date(best.time) - target);
            for (const item of timeseries) {
                const delta = Math.abs(new Date(item.time) - target);
                if (delta < bestDelta) {
                    best = item;
                    bestDelta = delta;
                }
            }

            // MET/YR bruger typisk time-opløsning tæt på nu og grovere opløsning længere fremme.
            // Hvis nærmeste datapunkt er for langt fra passagetiden, vises en tydelig besked i stedet
            // for at vise en forkert vejrtime.
            const maxAllowedDeltaMs = 3.5 * 60 * 60 * 1000;
            if (bestDelta > maxAllowedDeltaMs) {
                return {
                    ts: null,
                    reason: `Nærmeste vejrdata ligger for langt fra passagetiden. Passagetid: ${formatDateTimeDA(target)}.`
                };
            }

            return { ts: best, reason: null };
        }

        async function fetchWeather(p, target) {
            const key = `${p.lat.toFixed(4)},${p.lon.toFixed(4)}`;
            let data = weatherCache.get(key);
            if (!data) {
                const res = await fetch(`https://api.met.no/weatherapi/locationforecast/2.0/complete?lat=${p.lat}&lon=${p.lon}`, {
                    headers: { "User-Agent": MET_USER_AGENT }
                });
                if (!res.ok) throw new Error("Vejrdata kunne ikke hentes");
                data = await res.json();
                weatherCache.set(key, data);
            }
            const timeseries = data.properties?.timeseries || [];
            const choice = chooseForecast(timeseries, target);
            return { ts: choice.ts, reason: choice.reason, timeseries };
        }

        function getNumberOrNull(value) {
            const num = Number(value);
            return Number.isFinite(num) ? num : null;
        }

        function findNearestGust(timeseries, target, indexHint = -1) {
            if (!Array.isArray(timeseries)) return null;

            // Først tjekkes den valgte vejrtime, derefter nærmeste timer omkring passagetidspunktet.
            const candidates = [];
            if (indexHint >= 0) candidates.push(timeseries[indexHint]);
            for (const item of timeseries) candidates.push(item);

            let best = null;
            let bestDelta = Infinity;
            for (const item of candidates) {
                const gust = getNumberOrNull(item?.data?.instant?.details?.wind_speed_of_gust);
                if (gust === null) continue;
                const delta = Math.abs(new Date(item.time) - target);
                if (delta < bestDelta) {
                    best = gust;
                    bestDelta = delta;
                }
            }
            return best;
        }

        function weatherHtml(ts, target, timeseries = [], reason = "Ingen vejrudsigt for dette tidspunkt.") {
            if (!ts) return `<div class="coverage-warning">⚠️ ${reason}<br><span class="data-time">Vælg en tidligere dato/starttid eller lavere passagetid for punktet.</span></div>`;
            const instant = ts.data.instant.details;
            const next = ts.data.next_1_hours?.details || ts.data.next_6_hours?.details || {};
            const forecastTime = new Date(ts.time);
            const rain = next.precipitation_amount ?? 0;
            const windSpeedNumber = getNumberOrNull(instant.wind_speed);
            const directGustNumber = getNumberOrNull(instant.wind_speed_of_gust);
            const indexHint = Array.isArray(timeseries) ? timeseries.findIndex(item => item.time === ts.time) : -1;
            const gustNumber = directGustNumber ?? findNearestGust(timeseries, target, indexHint);
            const windText = `${formatWindValue(windSpeedNumber)} m/s (${gustNumber === null ? "–" : formatWindValue(gustNumber)} m/s)`;
            const arrowDeg = getNumberOrNull(instant.wind_from_direction) ?? 0;
            const tempNumber = getNumberOrNull(instant.air_temperature);
            const tempText = tempNumber === null ? "–" : tempNumber.toFixed(1).replace(".", ",");

            return `
                <div class="weather-line">${forecastSymbol(ts)} ${tempText} °C</div>
                <div class="weather-line">💧 ${String(rain).replace(".", ",")} mm</div>
                <div class="weather-line full">💨 ${windText} <span class="wind-arrow" style="transform: rotate(${arrowDeg}deg);">➤</span></div>
            `;
        }

        function pointPassageTime(p) {
            const start = parseDatoTid(els.startDate.value, els.startTime.value);
            const speed = getSpeed();
            if (!start || !speed) return null;
            return new Date(start.getTime() + (p.dist / speed * 3600000));
        }

        function fitRouteInVisibleArea() {
            if (!routeLine) return;
            map.invalidateSize();
            const panel = document.getElementById("panel");
            const panelRect = panel.getBoundingClientRect();
            const mapRect = map.getContainer().getBoundingClientRect();
            const isMobileLayout = window.matchMedia("(max-width: 720px)").matches;
            const safe = 22;
            const options = { animate: false, maxZoom: 16 };

            if (isMobileLayout) {
                // Menuen ligger nederst på mobil. Nederste padding svarer til den synlige menu,
                // så ruten zoomes mest muligt uden at blive dækket.
                options.paddingTopLeft = [safe, safe];
                options.paddingBottomRight = [safe, Math.max(safe, Math.ceil(mapRect.bottom - panelRect.top) + safe)];
            } else {
                // Menuen ligger til højre på desktop. Højre padding svarer til menuens overlap.
                options.paddingTopLeft = [safe, safe];
                options.paddingBottomRight = [Math.max(safe, Math.ceil(mapRect.right - panelRect.left) + safe), safe];
            }

            map.fitBounds(routeLine.getBounds(), options);
        }

        function updateStats() {
            const speed = getSpeed();
            const start = parseDatoTid(els.startDate.value, els.startTime.value);
            if (!totalDist || !speed || !start) {
                els.endDate.value = "";
                els.endTime.value = "";
                return;
            }
            const durationHours = totalDist / speed;
            const end = new Date(start.getTime() + durationHours * 3600000);
            els.endDate.value = formatDateDA(end);
            els.endTime.value = formatTime24(end);
            els.routeInfo.innerHTML = `
                <div class="stat"><small>Distance</small><strong>${totalDist.toFixed(1).replace(".", ",")} km</strong></div>
                <div class="stat"><small>Køretid</small><strong>${durationLabel(durationHours)}</strong></div>
                <div class="stat"><small>Slut</small><strong>${formatTime24(end)}</strong></div>
            `;
            els.statsSection.style.display = "block";
        }

        function renderListSkeleton() {
            els.list.innerHTML = "";
            els.pointCount.textContent = `${pointCollection.length} punkt${pointCollection.length === 1 ? "" : "er"}`;
            if (!pointCollection.length) {
                els.list.innerHTML = `<div id="hint">Ingen punkter endnu. Upload en GPX-rute først.</div>`;
                return;
            }

            updatePointMarkers();
            for (const p of routeOrderedPoints()) {
                const target = pointPassageTime(p);
                const card = document.createElement("div");
                card.className = `poi-card ${p.type === "start" ? "start" : p.type === "finish" ? "finish" : ""}`;
                card.id = `card-${p.id}`;
                card.innerHTML = `
                    <div class="poi-top">
                        <div>
                            <div class="poi-name">${p.type === "start" ? "Start" : p.type === "finish" ? "Mål" : `${userPointNumber(p)}. ${p.name}`}</div>
                            <div class="poi-meta">${p.dist.toFixed(1).replace(".", ",")} km · ${target ? formatDateTimeDA(target) : "–"}</div>
                        </div>
                        ${p.type === "user" ? `<button class="delete-btn" title="Fjern punkt" onclick="removePoint('${p.id}')">×</button>` : ""}
                    </div>
                    <div class="weather" id="weather-${p.id}"><div class="weather-line full">Henter vejr...</div></div>
                `;
                els.list.appendChild(card);
            }
        }

        async function updateWeather() {
            const start = parseDatoTid(els.startDate.value, els.startTime.value);
            const speed = getSpeed();
            if (!pointCollection.length || !start || !speed) return;

            const runId = ++weatherRunId;
            let unavailableCount = 0;
            setStatus("Henter vejr for ruten...");

            for (const p of routeOrderedPoints()) {
                if (runId !== weatherRunId) return;
                const target = pointPassageTime(p);
                const box = document.getElementById(`weather-${p.id}`);
                if (!box || !target) continue;
                try {
                    const { ts, reason, timeseries } = await fetchWeather(p, target);
                    if (!ts) unavailableCount++;
                    box.innerHTML = weatherHtml(ts, target, timeseries, reason);
                } catch (e) {
                    box.innerHTML = `<div class="weather-line full">⚠️ Kunne ikke hente vejrdata.</div>`;
                }
            }
            setStatus(unavailableCount > 0
                ? `${unavailableCount} punkt${unavailableCount === 1 ? "" : "er"} ligger uden for den tilgængelige vejrudsigt.`
                : "Vejret er opdateret for start, mål og dine punkter.");
        }

        let updateTimer = null;
        function updateAll() {
            updateStats();
            renderListSkeleton();
            clearTimeout(updateTimer);
            updateTimer = setTimeout(updateWeather, 250);
        }

        async function handleGpxUpload(file) {
            setStatus("Indlæser GPX-rute...");
            routeLayer.clearLayers();
            pointLayer.clearLayers();
            pointCollection = [];
            polylineCoords = [];
            cumulativeKm = [];
            totalDist = 0;
            weatherCache.clear();
            weatherRunId++;

            const text = await file.text();
            const xml = new DOMParser().parseFromString(text, "text/xml");
            const parserError = xml.querySelector("parsererror");
            if (parserError) {
                setStatus("GPX-filen kunne ikke læses. Prøv en anden fil.");
                return;
            }

            const trkpts = Array.from(xml.getElementsByTagName("trkpt"));
            polylineCoords = trkpts
                .map(p => [parseFloat(p.getAttribute("lat")), parseFloat(p.getAttribute("lon"))])
                .filter(([lat, lon]) => Number.isFinite(lat) && Number.isFinite(lon));

            if (polylineCoords.length < 2) {
                setStatus("GPX-filen mangler rutedata/trkpt-punkter.");
                return;
            }

            buildCumulativeDistances(polylineCoords);
            routeLine = L.polyline(polylineCoords, { color: "#00e5ff", weight: 5, opacity: 0.95 }).addTo(routeLayer);
            fitRouteInVisibleArea();

            await addPoint(polylineCoords[0][0], polylineCoords[0][1], "Start", "start", 0);
            await addPoint(polylineCoords[polylineCoords.length - 1][0], polylineCoords[polylineCoords.length - 1][1], "Mål", "finish", totalDist);
            setStatus("Ruten er indlæst. Klik på ruten for at tilføje flere vejrpunkter.");
            setMobilePanel(false);
            fitRouteInVisibleArea();
        }

        els.gpx.addEventListener("change", async (e) => {
            const file = e.target.files?.[0];
            if (!file) return;
            try {
                await handleGpxUpload(file);
            } catch (err) {
                setStatus("Der skete en fejl under indlæsning af GPX-filen.");
            }
        });

        els.speed.addEventListener("input", updateAll);
        els.refreshBtn.addEventListener("click", () => {
            weatherCache.clear();
            updateAll();
        });

        map.on("click", async (e) => {
            if (polylineCoords.length < 2) {
                setStatus("Upload en GPX-rute før du tilføjer vejrpunkter.");
                return;
            }
            const snap = nearestRoutePoint(e.latlng);
            if (snap.distanceFromClick > 1000) {
                setStatus("Klik tættere på ruten for at tilføje et punkt.");
                return;
            }
            await addPoint(snap.lat, snap.lon, null, "user", snap.dist);
            if (navigator.vibrate) navigator.vibrate(25);
            setStatus("Vejrpunkt tilføjet.");
        });
